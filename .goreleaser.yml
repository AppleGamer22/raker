# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: raker
before:
  hooks:
    - npm ci
    - npm run build
builds:
  - id: linux
    env: [ CGO_ENABLED=0 ]
    main: ./server
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'github.com/AppleGamer22/{{.ProjectName}}/shared.Version={{.Version}}'
      - -X 'github.com/AppleGamer22/{{.ProjectName}}/shared.Hash={{.FullCommit}}'
source:
  enabled: true
archives:
  - format_overrides:
      - goos: linux
        formats: [ none ]
changelog:
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore"
      - typo
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: "New Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 10
    - title: Other work
      order: 999
release:
  github:
    owner: AppleGamer22
    name: raker
  discussion_category_name: General
  prerelease: auto
# Docker (v2) configuration: replaces legacy `dockers` + `docker_manifests`.
# Uses buildx to produce multi-arch images/manifests. See:
# https://goreleaser.com/customization/package/dockers_v2/
dockers_v2:
  - id: raker
    dockerfile: Dockerfile
    images:
      - docker.io/applegamer22/{{.ProjectName}}
      - ghcr.io/applegamer22/{{.ProjectName}}
    tags:
      - "{{.Version}}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.title: "{{.ProjectName}}"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.version: "{{.Version}}"
    flags:
      - "--pull"
sboms:
  - artifacts: source
