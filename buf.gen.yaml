# yaml-language-server: $schema=https://json.schemastore.org/buf.gen.json
version: v2
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: server/buf/proto
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go:v1.19.1
    out: server/buf/connect
    opt:
      - paths=source_relative
      - simple
  - remote: buf.build/bufbuild/es:v2.11.0
    out: src/buf
    include_imports: true
    opt: target=ts
managed:
  enabled: true
  # override:
  #   - file_option: go_package
  #     value: github.com/AppleGamer22/raker/server/buf/proto/raker/v1
  #   - file_option: go_package
  #     module: buf.build/googleapis/googleapis
  #     value: google.golang.org/genproto/googleapis/type/latlng
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
