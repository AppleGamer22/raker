name: Test NPM Peer Dependencies
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "*.ts"
      - "*.tsx"
      - package-lock.json
      - package.json
      - tsconfig.json
jobs:
  npm-test:
    name: npm test
    runs-on: ubuntu-latest
    steps:
      - name: Pull Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set-up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
          check-latest: true
          cache: npm
      - run: cpm ci